<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100天快樂</title>
<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: url('https://www.transparenttextures.com/patterns/rose.png');
    opacity: 0.08;
    z-index: -1;
}
@keyframes fallEmoji {
    from {
        transform: translateY(0);
    }
    to {
        transform: translateY(120vh);
    }
}
    
.container {
    padding: 40px 20px;
}
h1 {
    font-size: 2.5em;
}
.progress {
    width: 95%;
    height: 10px;
    background: rgba(255,255,255,0.5);
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
}
.progress-bar { height: 100%; background: #fff; width: 0%; transition: width 1s; }
@keyframes move {
    from { background-position: 0 0; }
    to { background-position: 40px 0; }
}
    
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    from {transform: translateY(0vh);}
    to {transform: translateY(-100vh);}
}

.message {
    margin-top: 30px;
    font-size: 1.2em;
}
.story {
    margin-top: 30px;
    font-size: 1.1em;
    line-height: 1.8;
    padding: 0 20px;
}

button {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff6a88;
    font-size: 1.5em;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>
<div class="container">
    <h1>❤️ 給最愛的寶包 ❤️</h1>
    <h2 id="dayText"></h2>

    <div class="message" id="message"></div>
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <h3>今年的生活寶包陪我到處趴趴走，生活多了很多色彩，也多了很多色色((</h3>
    <h3>我們去看了線條小狗🐶<br>
        去酒吧🍹來接我機🛬<br>
        吹海風🌊唱日K🎵<br>
        逛插畫展🎨買買買🛍️<br>
        老人遊覽車行程👴👵🚌<br>
        吃浪漫鐵板燒🦞🍽️<br>
        成功看到煙火無人機🎇<br>
        <button onclick="dropRose()">按我</button>
        <br><br>
        這些與寶包的回憶都是我們一起創造的珍貴的寶物，謝謝寶包出現在我的生命裡。<br>
    </h3>
    <audio id="bgm" loop controls><source src="初恋.mp3" type="audio/mpeg"></audio>
</div>
<script>

const startDate = new Date("2026-01-17");
const messages = [
    "寶包開心我也開心💑和寶包在一起的每一天都充滿心跳與驚喜💓",
];
// =====================

const today = new Date();
const diffTime = today - startDate;
const currentDay = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

let day = currentDay
document.getElementById("dayText").innerText =
    `我們一起走到了第 ${day} 天💌💕`;
document.getElementById("message").innerText =
    messages[0];
    
const bar = document.getElementById("progressBar");
bar.style.width = "0%";

setTimeout(() => {
    bar.style.transition = "width 2.5s ease-out";
    bar.style.width = 100 + "%";
}, 500);

setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    heart.innerText = "❤️";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}, 500);

let firstRose = true;
let roseCount = 0;
function dropRose() {
    roseCount++;
    if (roseCount > 10) {
        roseCount = 0;
        firstRose = true;
    }
    const rose = document.createElement("div");
    rose.innerText = "🌹";
    rose.style.position = "fixed";
    rose.style.top = "-20px";
    rose.style.animation = "fallEmoji 2s linear, pop 0.5s ease";
    if (firstRose) {
        rose.style.left = "50%";
        rose.style.transform = "translateX(-50%)";
        rose.style.fontSize = "120px";
        firstRose = false;
    } else {
        rose.style.left = Math.random() * 100 + "vw";
        rose.style.fontSize = "50px";
    }
    document.body.appendChild(rose);
    setTimeout(() => rose.remove(), 2000);
}

document.addEventListener("click", () => {
    const audio = document.getElementById("bgm");
    audio.currentTime = 15;
    audio.volume = 0.4;
    audio.play();
}, { once: true });
    
window.onload = () => {
    const audio = document.getElementById("bgm");
    audio.play().catch(() => {
    });
};
 
</script>
</body>
</html>
