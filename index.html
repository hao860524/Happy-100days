<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100天快樂</title>
<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: url('https://www.transparenttextures.com/patterns/rose.png');
    opacity: 0.08;
    z-index: -1;
}
    
.container {
    padding: 40px 20px;
}
h1 {
    font-size: 2.5em;
}
.progress {
    width: 80%;
    height: 20px;
    background: rgba(255,255,255,0.3);
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
}
.progress-bar {
    height: 100%;
    background: repeating-linear-gradient(
        45deg,
        #fff,
        #fff 10px,
        #ffd1dc 10px,
        #ffd1dc 20px
    );
    animation: move 1s linear infinite;
}

@keyframes move {
    from { background-position: 0 0; }
    to { background-position: 40px 0; }
}
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

.rose {
    position: fixed;
    width: 30px;
    height: 30px;
    background-image: url('https://cdn-icons-png.flaticon.com/512/616/616494.png');
    background-size: cover;
    pointer-events: none;
    animation: fall 6s linear infinite;
    opacity: 0.8;
}

@keyframes fall {
    0% {
        transform: translateY(-10vh) rotate(0deg);
    }
    100% {
        transform: translateY(110vh) rotate(360deg);
    }
}
    
.message {
    margin-top: 30px;
    font-size: 1.2em;
}
.story {
    margin-top: 30px;
    font-size: 1.1em;
    line-height: 1.8;
    padding: 0 20px;
}
</style>
</head>

<body>
<div class="container">
    <h1>❤️ 給最愛的寶包 ❤️</h1>
    <h2 id="dayText"></h2>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="message" id="message"></div>

    <div class="story">
        今年的生活寶包陪我到處趴趴走，生活多了很多色彩，也多了很多色色。<br>
        我們去看了線條小狗、去酒吧、還來接我機、去吹海風、唱日K、插畫展、<br>
        老人遊覽車行程、吃浪漫鐵板燒、成功看到無人機煙火演出。<br><br>
        這些和寶包的共同回憶，都是珍貴的寶物。
    </div>
</div>

<script>

const startDate = new Date("2026-01-01");


const messages = [
    "看寶包開心我也開心",
    "和寶包在一起的每一天都充滿心跳與驚喜",
    "謝謝寶包出現在我的生命裡",
];
// =====================

const today = new Date();
const diffTime = today - startDate;
const currentDay = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

let day = currentDay

document.getElementById("dayText").innerText =
    `我們已經一起走到第 ${day} 天 💕`;

document.getElementById("progressBar").style.width =  100 + "%";

document.getElementById("message").innerText =
    messages[day % messages.length];

setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.innerText = "❤️";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);
</script>
</body>
</html>
